apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: douban-movie-analysis
  namespace: default
spec:
  type: Python
  pythonVersion: "3"
  mode: cluster
  image: apache/spark:3.5.1-python3
  imagePullPolicy: IfNotPresent
  mainApplicationFile: local:///opt/spark/work/analysis.py
  sparkVersion: "3.4.0"
  restartPolicy:
    type: Never
  sparkConf:
    spark.hadoop.fs.s3a.endpoint: "obs.cn-north-4.myhuaweicloud.com"
    spark.hadoop.fs.s3a.path.style.access: "true"
  driver:
    cores: 1
    memory: "1g"
    serviceAccount: spark
    env:
      - name: DATA_PATH
        value: "s3a://cloud-course-2023112554/douban_movies.csv"
  executor:
    cores: 1
    instances: 2
    memory: "1g"

