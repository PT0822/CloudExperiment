apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: pyspark-analysis
  namespace: default
spec:
  type: Python
  pythonVersion: "3"
  mode: cluster
  # Taskbook Appendix B requires replacing <YOUR_ORG> with the SWR org.
  # Build this image with spark/Dockerfile.spark and push it as pyspark:3.4.
  image: swr.cn-north-4.myhuaweicloud.com/cloud-course-2023112554/pyspark:3.4
  imagePullPolicy: IfNotPresent
  mainApplicationFile: local:///opt/spark/work/analysis.py
  sparkVersion: "3.4.0"
  restartPolicy:
    type: Never
  sparkConf:
    spark.hadoop.fs.s3a.endpoint: "obs.cn-north-4.myhuaweicloud.com"
    spark.hadoop.fs.s3a.path.style.access: "true"
  driver:
    cores: 1
    memory: "1g"
    serviceAccount: spark
    env:
      - name: DATA_PATH
        value: "s3a://cloud-course-2023112554/douban_movies.csv"
  executor:
    cores: 1
    instances: 2
    memory: "1g"
