<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>云计算课程设计</title>
  <style>
    body { margin: 0; font-family: "Microsoft YaHei", sans-serif; background: #f5f7fb; color: #1f2937; }
    main { max-width: 860px; margin: 64px auto; padding: 32px; background: white; border: 1px solid #d8dee9; }
    h1 { margin-top: 0; font-size: 32px; }
    button { padding: 10px 16px; border: 1px solid #1f2937; background: #1f2937; color: white; cursor: pointer; }
    pre { padding: 16px; background: #111827; color: #d1fae5; overflow: auto; }
  </style>
</head>
<body>
  <main>
    <h1>云计算技术课程设计</h1>
    <p>小组成员：2023112554 陈沛陶，2023112557 马志凯</p>
    <p>前端由 Nginx 提供，后端为 Flask API，Redis 用于保存访问计数。</p>
    <button id="ping">调用 /api/ping</button>
    <button id="visit">调用 /api/visit</button>
    <pre id="output">等待请求...</pre>
  </main>
  <script>
    async function callApi(path) {
      const res = await fetch(path);
      document.getElementById("output").textContent = JSON.stringify(await res.json(), null, 2);
    }
    document.getElementById("ping").onclick = () => callApi("/api/ping");
    document.getElementById("visit").onclick = () => callApi("/api/visit");
  </script>
</body>
</html>
