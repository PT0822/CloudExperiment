name: mirror-spark-operator-image

on:
  workflow_dispatch:
    inputs:
      source_image:
        description: Source Spark Operator controller image
        required: true
        default: ghcr.io/kubeflow/spark-operator/controller:2.5.1
      target_tag:
        description: Target image tag in Huawei SWR
        required: true
        default: "2.5.1"

permissions:
  contents: read

env:
  SWR_REGISTRY: swr.cn-north-4.myhuaweicloud.com
  SWR_ORG: cloud-course-2023112557

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Log in to Huawei Cloud SWR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.SWR_REGISTRY }}
          username: ${{ secrets.SWR_USERNAME }}
          password: ${{ secrets.SWR_PASSWORD }}

      - name: Pull source image
        run: |
          docker pull "${{ inputs.source_image }}"

      - name: Push image to Huawei Cloud SWR
        run: |
          TARGET_IMAGE="$SWR_REGISTRY/$SWR_ORG/spark-operator-controller:${{ inputs.target_tag }}"
          docker tag "${{ inputs.source_image }}" "$TARGET_IMAGE"
          docker push "$TARGET_IMAGE"
          echo "Mirrored image: $TARGET_IMAGE"
