name: build-push-deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

env:
  SWR_REGISTRY: swr.cn-north-4.myhuaweicloud.com
  SWR_ORG: cloud-course-2023112557
  K8S_NAMESPACE: default
  KUBECONFIG: ${{ github.workspace }}/kubeconfig.yaml

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Generate image tag
        run: |
          echo "IMAGE_TAG=${GITHUB_SHA::12}" >> "$GITHUB_ENV"
          echo "image tag=${GITHUB_SHA::12}"

      - name: Log in to Huawei Cloud SWR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.SWR_REGISTRY }}
          username: ${{ secrets.SWR_USERNAME }}
          password: ${{ secrets.SWR_PASSWORD }}

      - name: Build backend image
        run: |
          docker build -f app/backend/Dockerfile.backend \
            -t $SWR_REGISTRY/$SWR_ORG/backend:$IMAGE_TAG \
            -t $SWR_REGISTRY/$SWR_ORG/backend:latest \
            app/backend

      - name: Build frontend image
        run: |
          docker build -f app/frontend/Dockerfile.frontend \
            -t $SWR_REGISTRY/$SWR_ORG/frontend:$IMAGE_TAG \
            -t $SWR_REGISTRY/$SWR_ORG/frontend:latest \
            app/frontend

      - name: Push images to SWR
        run: |
          retry_push() {
            image="$1"
            for attempt in 1 2 3; do
              echo "Pushing ${image}, attempt ${attempt}/3"
              if docker push "${image}"; then
                return 0
              fi
              sleep $((attempt * 15))
            done
            return 1
          }

          retry_push $SWR_REGISTRY/$SWR_ORG/backend:$IMAGE_TAG
          retry_push $SWR_REGISTRY/$SWR_ORG/backend:latest
          retry_push $SWR_REGISTRY/$SWR_ORG/frontend:$IMAGE_TAG
          retry_push $SWR_REGISTRY/$SWR_ORG/frontend:latest

      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > "$KUBECONFIG"
          if grep -qE 'client-certificate:|client-key:|certificate-authority:' "$KUBECONFIG"; then
            echo "::error::KUBECONFIG_B64 must be generated from a flattened kubeconfig. Run: kubectl config view --raw --flatten --minify | base64 -w 0"
            exit 1
          fi
          kubectl config get-contexts
          kubectl get nodes -o wide

      - name: Create SWR image pull secret
        run: |
          kubectl -n $K8S_NAMESPACE create secret docker-registry swr-image-pull \
            --docker-server=$SWR_REGISTRY \
            --docker-username='${{ secrets.SWR_USERNAME }}' \
            --docker-password='${{ secrets.SWR_PASSWORD }}' \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl -n $K8S_NAMESPACE patch deployment/backend deployment/frontend \
            --type merge \
            -p '{"spec":{"template":{"spec":{"imagePullSecrets":[{"name":"swr-image-pull"}]}}}}'

      - name: Update CCE deployments
        run: |
          BACKEND_CONTAINER=$(kubectl -n $K8S_NAMESPACE get deployment/backend -o jsonpath='{.spec.template.spec.containers[0].name}')
          FRONTEND_CONTAINER=$(kubectl -n $K8S_NAMESPACE get deployment/frontend -o jsonpath='{.spec.template.spec.containers[0].name}')
          echo "backend container=${BACKEND_CONTAINER}"
          echo "frontend container=${FRONTEND_CONTAINER}"

          kubectl -n $K8S_NAMESPACE set image deployment/backend ${BACKEND_CONTAINER}=$SWR_REGISTRY/$SWR_ORG/backend:$IMAGE_TAG
          kubectl -n $K8S_NAMESPACE set image deployment/frontend ${FRONTEND_CONTAINER}=$SWR_REGISTRY/$SWR_ORG/frontend:$IMAGE_TAG

          kubectl -n $K8S_NAMESPACE rollout status deployment/backend --timeout=240s
          kubectl -n $K8S_NAMESPACE rollout status deployment/frontend --timeout=240s

      - name: Show deployed image tags
        run: |
          kubectl -n $K8S_NAMESPACE get deployment backend frontend \
            -o custom-columns=NAME:.metadata.name,IMAGE:.spec.template.spec.containers[*].image,READY:.status.readyReplicas,UPDATED:.status.updatedReplicas
          kubectl -n $K8S_NAMESPACE get pods -o wide
